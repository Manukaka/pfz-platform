name: daryasagar
description: "दर्यासागर — AI-powered Potential Fishing Zone app for Maharashtra fishermen"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.6.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.0
  shared_preferences: ^2.3.2
  flutter_animate: ^4.5.0
  cached_network_image: ^3.4.1
  geolocator: ^13.0.2
  url_launcher: ^6.3.0
  intl: ^0.19.0
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

# The following section is specific to Flutter packages.
