version: '3.8'

services:
  samudra-ai:
    build: .
    container_name: samudra-ai-backend
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=development
      - FLASK_DEBUG=True
      - PORT=5000
      - REGION_LAT_MIN=14.0
      - REGION_LAT_MAX=21.0
      - REGION_LNG_MIN=67.0
      - REGION_LNG_MAX=74.5
    volumes:
      - .:/app
    command: flask run --host=0.0.0.0
    restart: unless-stopped
