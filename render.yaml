services:
  - type: web
    name: samudra-ai
    runtime: python311
    plan: free
    buildCommand: pip install --upgrade pip setuptools wheel && pip install -r requirements.txt
    startCommand: gunicorn main:app --workers 4 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: FLASK_ENV
        value: production
      - key: FLASK_DEBUG
        value: 'False'
      - key: PORT
        value: '5000'
      - key: REGION_LAT_MIN
        value: '8.0'
      - key: REGION_LAT_MAX
        value: '24.0'
      - key: REGION_LNG_MIN
        value: '66.0'
      - key: REGION_LNG_MAX
        value: '78.0'
      - key: CMEMS_USERNAME
        sync: false
      - key: CMEMS_PASSWORD
        sync: false
      - key: NASA_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: INCOIS_USER
        value: manojdhamdhere@live.com
      - key: INCOIS_PASS
        sync: false
