services:
  - type: web
    name: samudra-ai
    runtime: python311
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app --workers 4 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: FLASK_ENV
        value: production
      - key: FLASK_DEBUG
        value: 'False'
      - key: PORT
        value: '5000'
      - key: REGION_LAT_MIN
        value: '14.0'
      - key: REGION_LAT_MAX
        value: '21.0'
      - key: REGION_LNG_MIN
        value: '67.0'
      - key: REGION_LNG_MAX
        value: '74.5'
      - key: ANTHROPIC_API_KEY
        sync: false
